        <label class="switch">
            <input class="hidden" type="checkbox" id="darkModeToggle">
            <span class="slider">
                <span id="sunIcon" class="toggle-icons dark:hidden">

                    </svg>
                </span>
                <span id="moonIcon" class="toggle-icons dark:block hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-moon dark:stroke-mint"
                        width="32" height="32" viewBox="0 0 24 24" stroke-width="1.5" fill="none" stroke-linecap="round"
                        stroke-linejoin="round">

</footer>
    <script>
        const darkModeToggle = document.getElementById('darkModeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const localStorageTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches && 'dark');

        const toggleDarkMode = (darkMode) => {
            document.documentElement.classList.toggle('dark', darkMode);
            localStorage.setItem('theme', darkMode ? 'dark' : 'light');
            sunIcon.classList.toggle('hidden', darkMode);
            moonIcon.classList.toggle('hidden', !darkMode);
        };

        darkModeToggle.checked = localStorageTheme === 'dark';
        toggleDarkMode(darkModeToggle.checked);

        darkModeToggle.addEventListener('change', () => toggleDarkMode(darkModeToggle.checked));
    </script>
